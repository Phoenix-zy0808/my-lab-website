<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3a52;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f5a7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#578b9e;stop-opacity:1" />
    </linearGradient>
    
    <!-- DNA 双螺旋结构 -->
    <g id="dnaStrand">
      <ellipse cx="0" cy="0" rx="60" ry="30" fill="rgba(255,255,255,0.1)" transform="rotate(-45)" />
      <ellipse cx="0" cy="0" rx="40" ry="20" fill="rgba(255,255,255,0.15)" transform="rotate(-45)" />
      <circle cx="0" cy="0" r="15" fill="rgba(255,255,255,0.2)" />
    </g>
    
    <!-- 细胞结构 -->
    <g id="cellStructure">
      <circle cx="0" cy="0" r="100" fill="rgba(122,184,201,0.1)" stroke="rgba(122,184,201,0.3)" stroke-width="2" />
      <circle cx="0" cy="0" r="70" fill="rgba(122,184,201,0.15)" />
      <circle cx="0" cy="0" r="40" fill="rgba(122,184,201,0.2)" />
      <circle cx="0" cy="0" r="20" fill="rgba(255,255,255,0.3)" />
    </g>
  </defs>
  
  <!-- 背景渐变 -->
  <rect width="1920" height="1080" fill="url(#bgGrad)" />
  
  <!-- 背景装饰图案 -->
  <g opacity="0.3">
    <!-- 左上角细胞 -->
    <use href="#cellStructure" x="200" y="150" />
    <!-- 右上角细胞 -->
    <use href="#cellStructure" x="1700" y="200" />
    <!-- 左下角细胞 -->
    <use href="#cellStructure" x="300" y="900" />
    <!-- 右下角细胞 -->
    <use href="#cellStructure" x="1650" y="850" />
  </g>
  
  <!-- DNA 双螺旋链（装饰性） -->
  <g opacity="0.2">
    <use href="#dnaStrand" x="400" y="300" />
    <use href="#dnaStrand" x="500" y="400" />
    <use href="#dnaStrand" x="450" y="500" />
    <use href="#dnaStrand" x="1400" y="350" />
    <use href="#dnaStrand" x="1500" y="450" />
    <use href="#dnaStrand" x="1450" y="550" />
    <use href="#dnaStrand" x="800" y="700" />
    <use href="#dnaStrand" x="900" y="800" />
    <use href="#dnaStrand" x="850" y="900" />
  </g>
  
  <!-- 中心装饰 -->
  <circle cx="960" cy="540" r="200" fill="rgba(255,255,255,0.05)" />
  <circle cx="960" cy="540" r="150" fill="rgba(255,255,255,0.08)" />
  <circle cx="960" cy="540" r="100" fill="rgba(255,255,255,0.1)" />
</svg>
